<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CrystalCode</title>
<p>Learn Whats Best For You</p>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050814;
  color: white;
  overflow: hidden;
}

/* 🌌 dark nebula background (hosting vibe) */
.nebula {
  position: fixed;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(34,197,94,0.15), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(56,189,248,0.15), transparent 40%),
    radial-gradient(circle at 50% 80%, rgba(167,139,250,0.15), transparent 40%);
  filter: blur(60px);
  animation: drift 10s ease-in-out infinite alternate;
  z-index: 0;
}

@keyframes drift {
  from { transform: translate(0px,0px) scale(1); }
  to { transform: translate(30px,-20px) scale(1.1); }
}

/* ⭐ stars */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1;
}

/* top bar */
nav {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  align-items: center;
}

.logo {
  font-weight: bold;
  font-size: 1.3rem;
  color: #22c55e;
}

/* main layout */
.hero {
  position: relative;
  z-index: 2;
  text-align: center;
  margin-top: 10vh;
}

.title {
  font-size: 3.5rem;
  font-weight: bold;
  background: linear-gradient(90deg, #22c55e, #38bdf8, #a78bfa, #22c55e);
  background-size: 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shine 4s linear infinite;
  text-shadow: 0 0 25px rgba(34,197,94,0.4);
}

@keyframes shine {
  0% { background-position: 0%; }
  100% { background-position: 300%; }
}

.subtitle {
  opacity: 0.8;
  margin-top: 10px;
}

/* buttons */
.btn {
  margin-top: 20px;
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.primary {
  background: #22c55e;
  color: black;
}

.primary:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #22c55e;
}

.secondary {
  background: transparent;
  border: 1px solid #38bdf8;
  color: #38bdf8;
  margin-left: 10px;
}

.secondary:hover {
  box-shadow: 0 0 15px #38bdf8;
}

/* server cards */
.plans {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 50px;
  flex-wrap: wrap;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 12px;
  width: 200px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  border-color: #22c55e;
  box-shadow: 0 0 25px rgba(34,197,94,0.3);
}

/* floating crystals */
.crystal {
  position: absolute;
  width: 10px;
  height: 10px;
  background: linear-gradient(45deg, #22c55e, #38bdf8);
  transform: rotate(45deg);
  animation: float 6s linear infinite;
  opacity: 0.7;
}

@keyframes float {
  from { transform: translateY(100vh) rotate(45deg); }
  to { transform: translateY(-10vh) rotate(45deg); }
}
</style>
</head>

<body>

<div class="nebula"></div>
<canvas id="stars"></canvas>

<nav>
  <div class="logo">⛏ CrystalCode Hosting</div>
  <div>Dashboard</div>
</nav>

<div class="hero">
  <div class="title">Minecraft Server Hosting</div>
  <div class="subtitle">Fast • Low Ping • Instant Setup • 24/7 Uptime</div>

  <button class="btn primary">Create Server</button>
  <button class="btn secondary">View Plans</button>
</div>

<div class="plans">
  <div class="card">
    <h3>🟢 Starter</h3>
    <p>1GB RAM</p>
    <p>Best for small worlds</p>
  </div>

  <div class="card">
    <h3>🔵 Pro</h3>
    <p>4GB RAM</p>
    <p>Great for servers</p>
  </div>

  <div class="card">
    <h3>🟣 Ultra</h3>
    <p>8GB RAM</p>
    <p>Modded servers</p>
  </div>
</div>

<script>
// ⭐ stars
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 0.4 + 0.1
  });
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";

  for (let s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fill();

    s.y += s.speed;

    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }
  }

  requestAnimationFrame(animate);
}

animate();

// 💠 crystals
for (let i = 0; i < 20; i++) {
  let c = document.createElement("div");
  c.className = "crystal";
  c.style.left = Math.random() * window.innerWidth + "px";
  c.style.animationDuration = (4 + Math.random() * 4) + "s";
  document.body.appendChild(c);
}

// resize
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
